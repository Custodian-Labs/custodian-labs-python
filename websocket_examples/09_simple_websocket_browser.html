<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simple Websocket Bridge Demo</title>
</head>
<body>
  <h1>Simple Websocket Bridge Demo</h1>
  <p>Start the FastAPI app first, then open this file in your browser.</p>
  <div id="log"></div>
  <input id="message" placeholder="Type a message" />
  <button id="send">Send</button>

  <script>
    const log = document.getElementById("log");
    const input = document.getElementById("message");
    const button = document.getElementById("send");
    const socket = new WebSocket("ws://127.0.0.1:8000/ws/chat");

    socket.addEventListener("message", (event) => {
      const data = JSON.parse(event.data);
      log.innerHTML += `<p><strong>Assistant:</strong> ${data.response || data.error}</p>`;
    });

    button.addEventListener("click", () => {
      const message = input.value.trim();
      if (!message) return;
      log.innerHTML += `<p><strong>You:</strong> ${message}</p>`;
      socket.send(JSON.stringify({ message }));
      input.value = "";
    });
  </script>
</body>
</html>
